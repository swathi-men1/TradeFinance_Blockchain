<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <title>ChainDocs | Dashboard</title>
  <meta name="viewport" content="width=device-width, initial-scale=1">

  <!-- Bootstrap CSS -->
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">

  <!-- Custom CSS -->
  <link href="../css/layout/theme.css" rel="stylesheet">
</head>

<body class="bg-light">

  <!-- Navbar -->
  <nav class="navbar navbar-expand-lg navbar-dark bg-dark">
    <div class="container-fluid">
      <a class="navbar-brand" href="#">ChainDocs</a>

      <div class="d-flex">
        <a href="documents.html" class="btn btn-outline-light btn-sm me-2">
          Documents
        </a>
        <button class="btn btn-outline-light btn-sm" id="logoutBtn">
          Logout
        </button>
      </div>
    </div>
  </nav>

  <!-- Dashboard Content -->
  <div class="container mt-5">
    <div class="card shadow-sm p-4">
      <h4 class="mb-3">Welcome to ChainDocs</h4>

      <p><strong>Email:</strong> <span id="userEmail"></span></p>
      <p><strong>Role:</strong> <span id="userRole"></span></p>
      <p><strong>Organization:</strong> <span id="userOrg"></span></p>

      <hr>

      <p class="text-muted">
        Use the navigation above to manage trade documents.
      </p>
    </div>
  </div>

  <!-- Dashboard JS -->
  <script src="../js/dashboard.js"></script>

</body>
</html>
