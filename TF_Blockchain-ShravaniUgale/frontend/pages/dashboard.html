<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <title>ChainDocs | Dashboard</title>
  <meta name="viewport" content="width=device-width, initial-scale=1">

  <!-- Bootstrap CSS -->
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">

  <!-- Theme CSS -->
  <link href="../css/layout/theme.css" rel="stylesheet">
</head>

<body class="bg-light">

  <!-- Top Navbar -->
  <nav class="navbar navbar-dark" style="background-color: var(--primary-color);">
    <div class="container-fluid">
      <span class="navbar-brand mb-0 h1">ChainDocs Dashboard</span>
      <button id="logoutBtn" class="btn btn-outline-light btn-sm">Logout</button>
    </div>
  </nav>

  <!-- Main Content -->
  <div class="container mt-5">
    <div class="card shadow-sm p-4">
      <h4 class="mb-3">Welcome</h4>
      <p><strong>Email:</strong> <span id="userEmail">Loading...</span></p>
      <p><strong>Role:</strong> <span id="userRole">Loading...</span></p>
      <p><strong>Organization:</strong> <span id="userOrg">Loading...</span></p>
    </div>
  </div>

<!-- Document Upload -->
<div class="container mt-4">
  <div class="card shadow-sm p-4">
    <h5>Upload Trade Document</h5>

    <form id="docForm">
      <div class="mb-3">
        <label class="form-label">Document Title</label>
        <input type="text" class="form-control" id="docTitle" required>
      </div>

      <div class="mb-3">
        <label class="form-label">Document Type</label>
        <select class="form-control" id="docType" required>
          <option value="">Select type</option>
          <option>Invoice</option>
          <option>Bill of Lading</option>
          <option>Letter of Credit</option>
        </select>
      </div>

      <button type="submit" class="btn btn-primary">Upload</button>
    </form>
  </div>
</div>

<!-- Document List -->
<div class="container mt-4">
  <div class="card shadow-sm p-4">
    <h5>Trade Documents</h5>
    <table class="table mt-3">
      <thead>
        <tr>
          <th>Title</th>
          <th>Type</th>
          <th>Status</th>
          <th>Organization</th>
        </tr>
      </thead>
      <tbody id="docTable">
      </tbody>
    </table>
  </div>
</div>

  <!-- Scripts -->
  <script src="../js/dashboard.js"></script>
</body>
</html>
