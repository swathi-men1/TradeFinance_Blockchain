<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <title>ChainDocs | Documents</title>
  <meta name="viewport" content="width=device-width, initial-scale=1">

  <!-- Bootstrap CSS -->
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">

  <!-- Custom CSS -->
  <link href="../css/layout/theme.css" rel="stylesheet">
</head>

<body class="bg-light">

  <!-- Navbar -->
  <nav class="navbar navbar-expand-lg navbar-dark bg-dark">
    <div class="container-fluid">
      <a class="navbar-brand" href="dashboard.html">ChainDocs</a>

      <div class="d-flex">
        <a href="dashboard.html" class="btn btn-outline-light btn-sm me-2">
          Dashboard
        </a>
        <button class="btn btn-outline-light btn-sm" id="logoutBtn">
          Logout
        </button>
      </div>
    </div>
  </nav>

  <div class="container mt-4">

    <!-- Upload Section (BANK ONLY) -->
    <div class="card shadow-sm p-4 mb-4" id="uploadSection">
      <h5>Upload Trade Document</h5>

      <form id="docForm">
        <div class="mb-3">
          <label class="form-label">Document Title</label>
          <input type="text" class="form-control" id="docTitle" required>
        </div>

        <div class="mb-3">
          <label class="form-label">Document Type</label>
          <select class="form-control" id="docType" required>
            <option value="">Select type</option>
            <option>Invoice</option>
            <option>Bill of Lading</option>
            <option>Letter of Credit</option>
          </select>
        </div>

        <button type="submit" class="btn btn-primary">
          Upload
        </button>
      </form>
    </div>

    <!-- Document List (ADMIN + BANK) -->
    <div class="card shadow-sm p-4" id="documentListSection">
      <h5>Trade Documents</h5>

      <table class="table mt-3">
        <thead>
          <tr>
            <th>Title</th>
            <th>Type</th>
            <th>Status</th>
            <th>Organization</th>
	    <th>Action</th>
          </tr>
        </thead>
        <tbody id="docTable"></tbody>
      </table>
    </div>

  </div>

  <!-- Documents JS -->
  <script src="../js/documents.js"></script>

</body>
</html>
