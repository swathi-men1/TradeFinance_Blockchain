<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <title>ChainDocs | Register</title>
  <meta name="viewport" content="width=device-width, initial-scale=1">

  <!-- Bootstrap CSS -->
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">

  <!-- Custom CSS -->
  <link href="../css/layout/theme.css" rel="stylesheet">
</head>

<body class="bg-light">

  <div class="container d-flex justify-content-center align-items-center vh-100">
    <div class="card shadow-sm p-4" style="width: 420px;">
      <h3 class="text-center mb-3">ChainDocs</h3>
      <p class="text-center text-muted mb-4">Create Account</p>

      <form id="registerForm">
        <div class="mb-3">
          <label class="form-label">Full Name</label>
          <input type="text" class="form-control" id="name" required />
        </div>

        <div class="mb-3">
          <label class="form-label">Email</label>
          <input type="email" class="form-control" id="email" required />
        </div>

        <div class="mb-3">
          <label class="form-label">Password</label>
          <input type="password" class="form-control" id="password" required />
        </div>

        <div class="mb-3">
          <label class="form-label">Role</label>
          <select class="form-control" id="role" required>
            <option value="">Select role</option>
            <option value="bank">Bank</option>
            <option value="admin">Admin</option>
          </select>
        </div>

        <div class="mb-3">
          <label class="form-label">Organization Name</label>
          <input type="text" class="form-control" id="org_name" required />
        </div>

        <button type="submit" class="btn btn-primary w-100">
          Register
        </button>
      </form>

      <div class="text-center mt-3">
        <small>
          Already have an account?
          <a href="login.html">Login</a>
        </small>
      </div>
    </div>
  </div>

  <script src="../js/register.js"></script>
</body>
</html>
